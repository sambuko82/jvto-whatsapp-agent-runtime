version: 1

# --- Customer job: a GROUPING LABEL only (sets ResponsePlan.customer_job). ---
# Required fields, actions, and disclosures are driven by the requirement profile below,
# NOT by the job. One intent can serve several jobs, so this is a default + overrides.
default_job_by_intent:
  general_greeting: greeting
  query_package_details: J1_package_discovery
  query_destination_details: J1_package_discovery
  query_policy: J1_package_discovery        # cross-job; overrides move it to J2 or J5
  plan_itinerary: J3_route_and_timing
  check_price: J2_price_and_value
  check_availability: J4_live_confirmation
  query_operational_notice: J4_live_confirmation
  get_booking_status: J5_exception_and_handoff
  get_payment_status: J5_exception_and_handoff
  complaint_or_refund: J5_exception_and_handoff
  human_handoff_request: J5_exception_and_handoff

job_overrides:
  - when_intent: query_package_details
    if_query_contains: ["price", "cost", "how much", "included", "inclusion", "include"]
    then_job: J2_price_and_value
  - when_intent: query_package_details
    if_query_contains: ["finish", "drop", "endpoint", "flight", "ferry", "train", "airport", "start in", "pickup"]
    then_job: J3_route_and_timing
  - when_intent: query_policy
    if_stage_in: ["paid", "pre_trip"]
    then_job: J5_exception_and_handoff
  - when_intent: query_policy
    if_query_contains: ["cancel", "refund", "reschedule", "change my", "amend"]
    then_job: J5_exception_and_handoff
  - when_intent: query_policy
    if_query_contains: ["deposit", "tax", "pay", "payment", "fee"]
    then_job: J2_price_and_value

# --- Requirement profile: the FUNCTIONAL driver of clarification + actions + disclosures. ---
default_profile_by_intent:
  general_greeting: general_information
  query_package_details: package_recommendation
  query_destination_details: general_information
  query_policy: policy_explanation
  plan_itinerary: route_validation
  check_price: standard_price
  check_availability: availability_check
  query_operational_notice: general_information
  get_booking_status: general_information
  get_payment_status: general_information
  complaint_or_refund: general_information
  human_handoff_request: general_information

# Applied in order; first match wins. selected_package_key flips package questions to "information".
profile_overrides:
  - when_intent: query_package_details
    if_query_contains: ["included", "inclusion", "include", "what is included", "what's included"]
    then_profile: package_information
  - when_intent: query_package_details
    if_query_contains: ["price", "cost", "how much", "total"]
    then_profile: standard_price
  - when_intent: query_package_details
    if_selected_package_key: true
    then_profile: package_information

# required/optional/conditional leaf paths resolved against TripBrief; plus per-profile
# default_actions and default_disclosures (disclosures reference guardrails keys).
requirement_profiles:
  general_information:
    required: []
    default_actions: []
    default_disclosures: []
  policy_explanation:
    required: []
    default_actions: []
    default_disclosures: []
  package_information:
    required: ["selected_package_key"]
    default_actions: ["catalog_lookup"]
    default_disclosures: []
  package_recommendation:
    required: ["destinations", "pickup.location", "dropoff.location"]
    optional: ["travel_dates.start", "pax.confirmed"]
    default_actions: ["catalog_lookup"]
    default_disclosures: []
  standard_price:
    required: ["selected_package_key", "pax.confirmed"]
    optional: ["travel_dates.start"]
    default_actions: ["catalog_lookup", "price_quote"]
    default_disclosures: ["availability_not_confirmed"]
  route_validation:
    required: ["travel_dates.start", "pax.confirmed", "pickup.location", "dropoff.location", "destinations"]
    conditional: ["connection_time"]
    default_actions: ["itinerary_core"]
    default_disclosures: ["route_feasibility_pending"]
  availability_check:
    required: ["selected_package_key", "travel_dates.start", "pax.confirmed"]
    default_actions: ["live_check"]
    default_disclosures: ["live_subject_to_confirmation"]

# Minimal clarifying questions keyed by missing TripBrief leaf path.
clarification_questions:
  "selected_package_key": "Which package are you asking about (or which destinations and how many days)?"
  "travel_dates.start": "What are your travel dates (start and end)?"
  "pax.confirmed": "How many travelers are confirmed, and are any still tentative?"
  "pickup.location": "Where would you like to start — which city, airport, or hotel?"
  "dropoff.location": "After the tour, would you like to finish in Surabaya, Banyuwangi/Ketapang, or Bali?"
  "destinations": "Which destinations are essential for you, and which are optional?"
  "pickup.arrival_time": "What time and date do you arrive, and on which flight, train, or ferry?"
  "dropoff.required_by": "By what time and from which airport, station, or harbour do you need to depart?"
  _default: "Could you share a few more trip details so I can help accurately?"
