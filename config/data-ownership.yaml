version: 1
owners:
  approved_public_knowledge:
    owner: knowledge-catalog-jvto-bootstrap
    runtime_access: released_projection_only
    examples:
      - public package concepts
      - destination explanations
      - approved policies
      - public safety guidance
      - trust evidence
  operational_feasibility:
    owner: jvto-itinerary-core
    runtime_access: deterministic_contract_or_projection
    examples:
      - package route mapping
      - location aliases
      - pickup and dropoff context
      - time-window constraints
      - scenario feasibility
  pricing:
    owner: transactional_pricing_service
    runtime_access: live_tool_only
    never_store_in:
      - knowledge_bundle
      - semantic_index
  availability:
    owner: booking_inventory_service
    runtime_access: live_tool_only
    never_store_in:
      - knowledge_bundle
      - semantic_index
  booking_payment_hotel_status:
    owner: transactional_backoffice
    runtime_access: authenticated_live_tool_only
    never_store_in:
      - knowledge_bundle
      - semantic_index
  customer_pii:
    owner: transactional_crm
    runtime_access: minimum_necessary_authenticated_lookup
    forbidden_in:
      - git_repository
      - source_cache
      - embedding_index
      - release_bundle
  conversation_state:
    owner: external_conversation_service
    runtime_access: opaque_no_pii
    key: context_ref
    note: >-
      TripBrief may be received, merged, validated, and patched at runtime, but is never
      persisted here as a customer database. No raw chat, name, email, phone, booking, or
      payment data; the durable store lives in an external service keyed by context_ref.
  customer_sales_catalog_and_price:
    owner: knowledge-catalog-jvto-bootstrap_and_standard_price_calculator
    runtime_access: projection_or_calculator_or_live_only
    note: >-
      The Customer Sales Decision Layer routes to these sources but never authors package
      catalog, price matrix, discount, hotel rate, add-on, or availability data in this repo.
